<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha1/0.6.0/sha1.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;

/* overlay */

body::before{

background:linear-gradient(135deg,

z-index:0;

.container{

.card{

backdrop-filter:blur(20px);

border-radius:22px;

padding:50px;

box-shadow:
0 30px 60px rgba(0,0,0,0.5),
inset 0 0 20px rgba(255,255,255,0.2);

border:1px solid rgba(255,255,255,0.3);

}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
flex-wrap:wrap;
}

.title{
font-size:34px;
font-weight:600;
}

.subtitle{
opacity:0.85;
font-size:16px;
}

/* OTP */

.otpBox{
text-align:center;
margin-top:20px;
}

.otp{

font-size:120px;
font-weight:700;
letter-spacing:12px;

background:linear-gradient(90deg,#ff0000,#00ff00,#0000ff);
-webkit-background-clip:text;
color:transparent;

/* glow RGB */

text-shadow:
0 0 10px #ff0000,
0 0 20px #00ff00,
0 0 30px #0000ff,
0 0 40px #ff00ff;

animation:rgbGlow 3s linear infinite;

}

@keyframes rgbGlow{

0%{filter:hue-rotate(0deg);}
100%{filter:hue-rotate(360deg);}

}

/* timer */

.timer{
margin-top:15px;
font-size:20px;
opacity:0.9;
}

/* progress bar */

.progress{

margin-top:25px;
height:12px;

background:rgba(255,255,255,0.2);

border-radius:30px;

overflow:hidden;

position:relative;

}

.bar{

height:100%;

width:100%;

background:linear-gradient(90deg,
red,
orange,
yellow,
lime,
cyan,
blue,
magenta,
red);

background-size:300%;

animation:rgbMove 6s linear infinite;

box-shadow:
0 0 10px red,
0 0 20px blue,
0 0 30px cyan;

}

/* running light */

.bar::after{

content:"";

position:absolute;

top:0;
left:-150px;

width:150px;
height:100%;

background:rgba(255,255,255,0.6);

filter:blur(8px);

animation:runlight 2s linear infinite;

}

@keyframes runlight{

0%{transform:translateX(-150px)}
100%{transform:translateX(1000px)}

}

@keyframes rgbMove{

0%{background-position:0%}
100%{background-position:300%}

}

/* info grid */

.grid{

margin-top:40px;

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:20px;

}

.info{

background:rgba(255,255,255,0.12);

padding:20px;

backdrop-filter:blur(10px);

}

.infoTitle{

}

.infoValue{

}

/* footer */

.footer{

margin-top:40px;

font-size:13px;

opacity:0.8;

text-align:center;

}

/* mobile */

@media(max-width:600px){

.card{padding:30px}

.title{font-size:24px}

.otp{
font-size:70px;
letter-spacing:6px;
}

}

</style>

</head>

<body>

<div class="container">

</div>

<div class="subtitle">

</div>

</div>

<div class="otpBox">

<div id="otp" class="otp">------</div>

<div id="timer" class="timer"></div>

</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div class="grid">

<div class="info">
<div class="infoTitle">Status Server CBT</div>
<div class="infoValue">ONLINE</div>
</div>

<div class="info">
<div class="infoTitle">Mode Ujian</div>

</div>

<div class="info">
<div class="infoTitle">Perubahan OTP</div>
<div class="infoValue">60 Detik</div>
</div>

<div class="info">
<div class="infoTitle">Monitoring</div>
<div class="infoValue">CBT Guardian</div>
</div>

</div>

<div class="footer">

CBT Monitoring System • SMAN 1 Sooko Mojokerto

</div>

</div>

</div>

<script>

const SECRET_SALT="SOOKO_HEBAT_2026";
const INTERVAL=60;

function generateOTP(){

let epoch=Math.floor(Date.now()/1000/INTERVAL);

let hash=sha1(epoch+SECRET_SALT);

return (parseInt(hash.substring(0,8),16)%1000000)
.toString()
.padStart(6,"0");

}

function update(){

let seconds=Math.floor(Date.now()/1000);

let remain=INTERVAL-(seconds%INTERVAL);

document.getElementById("timer").innerText=
"Kode berubah dalam "+remain+" detik";

document.getElementById("otp").innerText=generateOTP();

/* progress bar */

let percent=(remain/INTERVAL)*100;

document.getElementById("bar").style.width=percent+"%";

}

setInterval(update,1000);

update();

</script>

</body>
</html>
