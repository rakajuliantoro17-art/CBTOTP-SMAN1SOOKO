<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CBT OTP Unlock - SMAN 1 Sooko</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:15px;

background:
linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.6)),
url("background.jpg");

background-size:cover;
background-position:center;
color:white;
}

/* GLASS OVERLAY */
body::before{
content:"";
position:fixed;
inset:0;
background:linear-gradient(135deg,
rgba(255,0,200,0.25),
rgba(120,0,255,0.25),
rgba(0,255,170,0.25));
backdrop-filter:blur(8px);
z-index:0;
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
width:100%;
max-width:1100px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
border-radius:28px;
padding:25px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:15px;
margin-bottom:20px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
}

.logo img{
height:55px;
border-radius:12px;
background:white;
padding:6px;
}

.title{
font-size:22px;
font-weight:700;
}

.subtitle{
font-size:13px;
opacity:0.7;
}

/* MAIN GRID */
.main{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

/* OTP SECTION */
.otpBox{
text-align:center;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,0.06);
}

.otp{
font-size:clamp(45px,8vw,100px);
font-weight:800;
letter-spacing:8px;
}

.otpLabel{
font-size:13px;
opacity:0.7;
margin-top:10px;
}

/* PROGRESS */
.progress{
margin-top:15px;
height:14px;
border-radius:20px;
overflow:hidden;
background:rgba(255,255,255,0.1);
}

.bar{
height:100%;
background:linear-gradient(90deg,#00c6ff,#001f7a);
}

/* PIE */
.pie{
margin:20px auto;
width:100px;
height:100px;
border-radius:50%;
}

/* GRID INFO */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
}

.info{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:14px;
}

.infoTitle{
font-size:12px;
opacity:0.7;
}

.infoValue{
font-size:16px;
font-weight:600;
margin-top:5px;
}

/* FOOTER */
.footer{
margin-top:15px;
text-align:center;
font-size:12px;
opacity:0.6;
}

/* DESKTOP */
@media(min-width:768px){
.main{
grid-template-columns:1.2fr 1fr;
}

.otpBox{
padding:30px;
}

.otp{
font-size:90px;
}
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<!-- HEADER -->
<div class="header">
<div class="logo">
<img src="https://sman1sooko.sch.id/media_library/images/397a98c4618261af0d970851901f2b5b.png">
<div>
<div class="title">CBT OTP Unlock System</div>
<div class="subtitle">SMAN 1 Sooko • Tim IT</div>
</div>
</div>

<div class="subtitle">Secure Exam Mode</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- LEFT -->
<div class="otpBox">

<div id="otp1" class="otp">------</div>
<div class="otpLabel">OTP Utama</div>

<div id="otp2Wrap" style="display:none;">
<div class="otpLabel">OTP Permanen</div>
<div id="otp2" class="otp">------</div>
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="pie" class="pie"></div>

</div>

<!-- RIGHT -->
<div class="grid">

<div class="info">
<div class="infoTitle">Status Server</div>
<div class="infoValue">ONLINE</div>
</div>

<div class="info">
<div class="infoTitle">Mode Ujian</div>
<div id="mode" class="infoValue">Secure</div>
</div>

<div class="info">
<div class="infoTitle">Interval OTP</div>
<div class="infoValue">60 Detik</div>
</div>

<div class="info">
<div class="infoTitle">Monitoring</div>
<div class="infoValue">CBT Guardian</div>
</div>

</div>

</div>

<div class="footer">
CBT Monitoring System • SMAN 1 Sooko Mojokerto
</div>

</div>
</div>

<script>

/* HASH SAFE */
function simpleHash(str){
let h=0;
for(let i=0;i<str.length;i++){
h=(h<<5)-h+str.charCodeAt(i);
h|=0;
}
return Math.abs(h).toString(16);
}

const SECRET="SOOKO_HEBAT_2026";
const PERM="SOOKO_PERMANENT_2026";

const OTP_INTERVAL=60;
const PERM_INTERVAL=300;

function otp(){
let e=Math.floor(Date.now()/1000/OTP_INTERVAL);
let h=simpleHash(e+SECRET);
return (parseInt(h.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

function otp2(){
let e=Math.floor(Date.now()/1000/PERM_INTERVAL);
let h=simpleHash(e+PERM);
return (parseInt(h.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

function update(){

let now=Math.floor(Date.now()/1000);

/* OTP utama */
document.getElementById("otp1").innerText=otp();

/* BAR */
let remain=OTP_INTERVAL-(now%OTP_INTERVAL);
document.getElementById("bar").style.width=(remain/OTP_INTERVAL)*100+"%";

/* PIE */
let premain=PERM_INTERVAL-(now%PERM_INTERVAL);
let percent=1-(premain/PERM_INTERVAL);
let deg=percent*360;

/* warna */
let r = percent < 0.5 ? 255 : Math.floor(255 - (percent-0.5)*2*255);
let g = percent > 0.5 ? 255 : Math.floor(percent*2*255);

let color = `rgb(${r},${g},0)`;

document.getElementById("pie").style.background=
`conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.1) ${deg}deg)`;

/* OTP permanen */
if(premain < 5){
document.getElementById("otp2Wrap").style.display="block";
document.getElementById("otp2").innerText=otp2();
document.getElementById("mode").innerText="Permanent";
}

}

setInterval(update,1000);
update();

</script>

</body>
</html>
