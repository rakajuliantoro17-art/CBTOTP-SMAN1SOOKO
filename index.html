<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CBT OTP Unlock System - SMAN 1 Sooko</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha1/0.6.0/sha1.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.4)),
url("background.jpg");

background-size:cover;
background-position:center;
color:white;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(135deg,
rgba(255,0,200,0.25),
rgba(120,0,255,0.25),
rgba(0,255,170,0.25));

backdrop-filter:blur(6px);
z-index:0;
}

.container{
position:relative;
z-index:2;
width:100%;
max-width:900px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
border-radius:28px;
padding:30px;

box-shadow:
0 0 20px rgba(0,150,255,0.2),
0 0 40px rgba(0,150,255,0.1),
inset 0 0 15px rgba(255,255,255,0.1);

border:1px solid rgba(255,255,255,0.2);
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
height:50px;
border-radius:10px;
background:white;
padding:4px;
}

.title{
font-size:22px;
font-weight:600;
}

.subtitle{
font-size:13px;
opacity:0.7;
}

/* OTP */

.otpBox{
text-align:center;
margin:20px 0;
}

.otp{
font-size:90px;
font-weight:700;
letter-spacing:8px;
text-shadow:0 0 10px rgba(0,150,255,0.4);
}

.timer{
font-size:14px;
margin-top:5px;
}

/* PROGRESS BAR */

.progress{
margin-top:10px;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:30px;
overflow:hidden;
}

.bar{
height:100%;
width:100%;
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

/* PIE TIMER */

.pieWrap{
display:flex;
justify-content:center;
margin-top:15px;
}

.pie{
width:80px;
height:80px;
border-radius:50%;
background:conic-gradient(#00c6ff 0deg, rgba(255,255,255,0.1) 0deg);
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

/* TABLE */

.row{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.08);
padding:12px;
border-radius:12px;
margin-top:10px;
}

/* BUTTON */

.btn{
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.unlock{
background:#00c853;
color:white;
}

.permanent{
background:#ff5252;
color:white;
margin-left:5px;
}

.disabled{
opacity:0.4;
pointer-events:none;
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
<div class="logo">
<img src="https://sman1sooko.sch.id/media_library/images/397a98c4618261af0d970851901f2b5b.png">
<div>
<div class="title">CBT OTP Unlock</div>
<div class="subtitle">SMAN 1 Sooko • Tim IT</div>
</div>
</div>
<div class="subtitle">Secure Mode</div>
</div>

<div class="otpBox">
<div id="otp" class="otp">------</div>
<div id="timer" class="timer"></div>
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<!-- PIE TIMER -->
<div class="pieWrap">
<div id="pie" class="pie">0</div>
</div>

<!-- LIST -->
<div id="list"></div>

</div>
</div>

<script>

const SECRET="SOOKO_HEBAT_2026";
const PERMANENT_SECRET="SOOKO_PERMANENT_2026";

const INTERVAL=60;
const PERMANENT_INTERVAL=300;

/* OTP */

function generateOTP(){
let epoch=Math.floor(Date.now()/1000/INTERVAL);
let hash=sha1(epoch+SECRET);
return (parseInt(hash.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

function generatePermanentOTP(){
let epoch=Math.floor(Date.now()/1000/PERMANENT_INTERVAL);
let hash=sha1(epoch+PERMANENT_SECRET);
return (parseInt(hash.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

/* DATA */

const siswa=[
{nama:"Andi Pratama",status:"Terblokir"},
{nama:"Siti Aisyah",status:"Terblokir"},
{nama:"Rizky Maulana",status:"Terblokir"}
];

function render(){

let html="";

siswa.forEach((s,i)=>{

html+=`
<div class="row">
<div>
<b>${s.nama}</b><br>
<small>${s.status}</small>
</div>

<div>
<button class="btn unlock" onclick="unlock(${i})">Unlock</button>
<button id="perm${i}" class="btn permanent disabled" onclick="permanent(${i})">Permanent</button>
</div>
</div>
`;

});

document.getElementById("list").innerHTML=html;

}

/* ACTION */

function unlock(i){

let input=prompt("Masukkan OTP:");

if(input===generateOTP()){
siswa[i].status="Unlock Sementara";
alert("Berhasil!");
}else{
alert("OTP salah!");
}

render();

}

function permanent(i){

let otp=generatePermanentOTP();

let input=prompt("OTP PERMANEN:\n"+otp+"\nMasukkan ulang:");

if(input===otp){
siswa[i].status="Unlock Permanen";
alert("Unlock permanen berhasil!");
}else{
alert("OTP salah!");
}

render();

}

/* UPDATE */

function update(){

let now=Math.floor(Date.now()/1000);

/* OTP timer */
let remain=INTERVAL-(now%INTERVAL);
document.getElementById("otp").innerText=generateOTP();
document.getElementById("timer").innerText="OTP berubah dalam "+remain+" detik";
document.getElementById("bar").style.width=(remain/INTERVAL)*100+"%";

/* Permanent timer */
let premain=PERMANENT_INTERVAL-(now%PERMANENT_INTERVAL);

/* PIE */
let deg=(1-(premain/PERMANENT_INTERVAL))*360;
document.getElementById("pie").style.background=
`conic-gradient(#ff5252 ${deg}deg, rgba(255,255,255,0.1) ${deg}deg)`;

document.getElementById("pie").innerText=premain+"s";

/* ENABLE BUTTON */
if(premain<5){
document.querySelectorAll(".permanent").forEach(b=>{
b.classList.remove("disabled");
});
}else{
document.querySelectorAll(".permanent").forEach(b=>{
b.classList.add("disabled");
});
}

}

setInterval(update,1000);
update();
render();

</script>

</body>
</html>
