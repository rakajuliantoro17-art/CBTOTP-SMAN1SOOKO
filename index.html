<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background-image:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
background-size:cover;
background-position:center;

color:white;
}

/* overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(135deg,
rgba(255,0,200,0.35),
rgba(120,0,255,0.35),
rgba(0,255,170,0.35));

backdrop-filter:blur(10px);
z-index:0;
}

/* container */

.container{
position:relative;
z-index:2;
width:100%;
max-width:420px;
padding:15px;
}

/* card */

.card{
background:rgba(255,255,255,0.18);
backdrop-filter:blur(20px);

border-radius:24px;
min-height:80vh;

display:flex;
flex-direction:column;
justify-content:space-between;

padding:25px;

box-shadow:
0 20px 50px rgba(0,0,0,0.5),
inset 0 0 20px rgba(255,255,255,0.2);

border:1px solid rgba(255,255,255,0.3);
}

/* header */

.header{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:10px;
}

.logo{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.logo img{
height:50px;
border-radius:12px;
background:rgba(255,255,255,0.85);
padding:5px;
box-shadow:0 0 10px rgba(255,255,255,0.3);
}

.title{
font-size:20px;
font-weight:600;
}

.subtitle{
font-size:13px;
opacity:0.8;
}

/* OTP */

.otpBox{
flex-grow:1;
display:flex;
flex-direction:column;
justify-content:center;
text-align:center;
}

.otp{
font-size:72px;
font-weight:700;
letter-spacing:8px;

color:rgba(255,255,255,0.95);

text-shadow:
0 0 4px rgba(255,255,255,0.25),
0 0 8px rgba(255,255,255,0.15),
0 2px 6px rgba(0,0,0,0.4);
}

.timer{
margin-top:8px;
font-size:14px;
opacity:0.85;
}

/* progress */

.progress{
margin-top:15px;
height:8px;
background:rgba(255,255,255,0.2);
border-radius:30px;
overflow:hidden;
position:relative;
}

.bar{
height:100%;
width:100%;

background:linear-gradient(90deg,
red,orange,yellow,lime,cyan,blue,magenta,red);

background-size:300%;
animation:rgbMove 6s linear infinite;

box-shadow:
0 0 10px red,
0 0 20px blue;
}

.bar::after{
content:"";
position:absolute;
top:0;
left:-150px;
width:120px;
height:100%;
background:rgba(255,255,255,0.6);
filter:blur(6px);
animation:runlight 2s linear infinite;
}

/* grid */

.grid{
margin-top:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.info{
background:rgba(255,255,255,0.12);
padding:10px;
border-radius:10px;
backdrop-filter:blur(10px);
}

.infoTitle{
font-size:11px;
opacity:0.7;
}

.infoValue{
font-size:14px;
font-weight:600;
margin-top:3px;
}

/* footer */

.footer{
margin-top:10px;
font-size:11px;
opacity:0.7;
text-align:center;
}

/* desktop */

@media(min-width:768px){

.container{
max-width:900px;
}

.card{
min-height:auto;
padding:40px;
}

.header{
flex-direction:row;
justify-content:space-between;
text-align:left;
}

.logo{
flex-direction:row;
}

.title{
font-size:28px;
}

.otp{
font-size:110px;
letter-spacing:10px;
}

.grid{
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.info{
padding:15px;
}

.infoTitle{
font-size:13px;
}

.infoValue{
font-size:18px;
}

}

/* animation */

@keyframes runlight{
0%{transform:translateX(-150px)}
100%{transform:translateX(1000px)}
}

@keyframes rgbMove{
0%{background-position:0%}
100%{background-position:300%}
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<img src="https://sman1sooko.sch.id/media_library/images/397a98c4618261af0d970851901f2b5b.png">
<div>
<div class="title">CBT OTP Unlock System</div>

</div>
</div>

</div>

<div class="otpBox">
<div id="otp" class="otp">------</div>
<div id="timer" class="timer"></div>
</div>

<div id="bar" class="bar"></div>
</div>

<div class="grid">

<div class="info">
<div class="infoTitle">Status Server CBT</div>
<div class="infoValue">ONLINE</div>
</div>

<div class="info">
<div class="infoTitle">Mode Ujian</div>

<div class="infoValue">CBT Guardian</div>
</div>

</div>

<div class="footer">
CBT Monitoring System • SMAN 1 Sooko Mojokerto
</div>

</div>

</div>

<script>

const SECRET_SALT="SOOKO_HEBAT_2026";
const INTERVAL=60;

function generateOTP(){
let epoch=Math.floor(Date.now()/1000/INTERVAL);
let hash=sha1(epoch+SECRET_SALT);

return (parseInt(hash.substring(0,8),16)%1000000)
.toString()
.padStart(6,"0");
}

function update(){

let seconds=Math.floor(Date.now()/1000);
let remain=INTERVAL-(seconds%INTERVAL);

document.getElementById("timer").innerText=
"Kode berubah dalam "+remain+" detik";

document.getElementById("otp").innerText=generateOTP();

let percent=(remain/INTERVAL)*100;
document.getElementById("bar").style.width=percent+"%";

}

setInterval(update,1000);
update();

</script>

</body>
</html>
