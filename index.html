<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CBT OTP Unlock - SMAN 1 Sooko</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("background.jpg");

background-size:cover;
background-position:center;
color:white;
}

.container{width:100%;max-width:500px;padding:10px;}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
border-radius:24px;
padding:25px;
text-align:center;
}

.title{font-size:20px;font-weight:700;}
.subtitle{font-size:12px;opacity:0.7;}

.otp{
font-size:60px;
font-weight:700;
letter-spacing:6px;
margin-top:10px;
}

/* BAR */
.progress{
margin-top:15px;
height:12px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
background:linear-gradient(90deg,#00c6ff,#001f7a);
}

/* PIE */
.pie{
margin:20px auto;
width:90px;
height:90px;
border-radius:50%;
background:conic-gradient(red 0deg, rgba(255,255,255,0.1) 0deg);
}

/* INFO */
.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.box{
background:rgba(255,255,255,0.1);
padding:8px;
border-radius:10px;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="title">CBT OTP Unlock</div>
<div class="subtitle">SMAN 1 Sooko • Secure Mode</div>

<div id="otp1" class="otp">------</div>

<div id="otp2Wrap" style="display:none;">
<div style="margin-top:10px;font-size:12px;">OTP Permanen</div>
<div id="otp2" class="otp">------</div>
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="pie" class="pie"></div>

<div class="info">
<div class="box">Status: ONLINE</div>
<div class="box" id="mode">Mode: Normal</div>
<div class="box">OTP: 60s</div>
<div class="box">Monitoring: Active</div>
</div>

</div>
</div>

<script>

/* SHA1 fallback biar tidak putih */
function simpleHash(str){
let h=0;
for(let i=0;i<str.length;i++){
h=(h<<5)-h+str.charCodeAt(i);
h|=0;
}
return Math.abs(h).toString(16);
}

const SECRET="SOOKO_HEBAT_2026";
const PERM="SOOKO_PERMANENT_2026";

const OTP_INTERVAL=60;
const PERM_INTERVAL=300;

function otp(){
let e=Math.floor(Date.now()/1000/OTP_INTERVAL);
let h=simpleHash(e+SECRET);
return (parseInt(h.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

function otp2(){
let e=Math.floor(Date.now()/1000/PERM_INTERVAL);
let h=simpleHash(e+PERM);
return (parseInt(h.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

function update(){

let now=Math.floor(Date.now()/1000);

/* OTP biasa */
document.getElementById("otp1").innerText=otp();

/* BAR */
let remain=OTP_INTERVAL-(now%OTP_INTERVAL);
document.getElementById("bar").style.width=(remain/OTP_INTERVAL)*100+"%";

/* PIE */
let premain=PERM_INTERVAL-(now%PERM_INTERVAL);
let percent=1-(premain/PERM_INTERVAL);
let deg=percent*360;

/* warna merah → kuning → hijau */
let r = percent < 0.5 ? 255 : Math.floor(255 - (percent-0.5)*2*255);
let g = percent > 0.5 ? 255 : Math.floor(percent*2*255);

let color = `rgb(${r},${g},0)`;

document.getElementById("pie").style.background=
`conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.1) ${deg}deg)`;

/* OTP permanen muncul otomatis */
if(premain < 5){
document.getElementById("otp2Wrap").style.display="block";
document.getElementById("otp2").innerText=otp2();
document.getElementById("mode").innerText="Mode: Permanent";
}

}

setInterval(update,1000);
update();

</script>

</body>
</html>
