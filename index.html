<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha1/0.6.0/sha1.min.js"></script>

<style>
#cbtLockOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:999999;
display:flex; /* langsung tampil */
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff4ecd,#8a5bff,#00ffc8);
font-family:system-ui;
}

.cbtCard{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:20px;
padding:30px;
width:90%;
max-width:420px;
color:white;
text-align:center;
box-shadow:0 0 40px rgba(255,255,255,0.25);
}

.cbtTitle{
font-size:22px;
font-weight:700;
margin-bottom:10px;
}

.progress{
margin-top:15px;
height:12px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
background:linear-gradient(90deg,#4facfe,#001f7a);
}

.pie{
margin-top:20px;
width:80px;
height:80px;
border-radius:50%;
margin-left:auto;
margin-right:auto;
background:conic-gradient(red 0deg, rgba(255,255,255,0.1) 0deg);
}

input{
margin-top:15px;
padding:10px;
width:80%;
border-radius:10px;
border:none;
text-align:center;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:white;
cursor:pointer;
}
</style>

<div id="cbtLockOverlay">
<div class="cbtCard">

<div class="cbtTitle">CBT LOCK TEST</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="pie" class="pie"></div>

<input id="unlockInput" placeholder="Masukkan OTP">
<br>
<button onclick="unlock()">UNLOCK</button>

</div>
</div>

<script>

/* fallback kalau sha1 gagal */
function safeHash(str){
if(typeof sha1 !== "undefined"){
return sha1(str);
}else{
return btoa(str); // fallback sederhana
}
}

const SECRET="SOOKO_HEBAT_2026";
const PERM="SOOKO_PERMANENT_2026";

function otp(){
let e=Math.floor(Date.now()/1000/60);
return (parseInt(safeHash(e+SECRET).substring(0,8),16)%1000000)
.toString().padStart(6,"0");
}

function otp2(){
let e=Math.floor(Date.now()/1000/300);
return (parseInt(safeHash(e+PERM).substring(0,8),16)%1000000)
.toString().padStart(6,"0");
}

function unlock(){

let val=document.getElementById("unlockInput").value;

if(val===otp()){
alert("OTP biasa benar");
return;
}

let second=prompt("OTP permanen:\n"+otp2());

if(second===otp2()){
alert("OTP permanen benar");
}else{
alert("salah semua");
}

}

/* visual jalan terus */
setInterval(()=>{

let now=Math.floor(Date.now()/1000);

/* BAR */
let remain=60-(now%60);
document.getElementById("bar").style.width=(remain/60)*100+"%";

/* PIE */
let premain=300-(now%300);
let percent=1-(premain/300);
let deg=percent*360;

let r = percent < 0.5 ? 255 : Math.floor(255 - (percent-0.5)*2*255);
let g = percent > 0.5 ? 255 : Math.floor(percent*2*255);

let color = `rgb(${r},${g},0)`;

document.getElementById("pie").style.background=
`conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.1) ${deg}deg)`;

},1000);

</script>
