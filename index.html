<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.4)),
url("background.jpg");

background-size:cover;
background-position:center;
color:white;
}

/* glass overlay */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(135deg,
rgba(255,0,200,0.35),
rgba(120,0,255,0.35),
rgba(0,255,170,0.35));

backdrop-filter:blur(5px);
z-index:0;
}  

.container{
position:relative;
z-index:2;
width:100%;
max-width:420px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border-radius:28px;
min-height:80vh;

display:flex;
flex-direction:column;
justify-content:space-between;

padding:25px;

box-shadow:
0 0 20px rgba(0,150,255,0.2),
0 0 40px rgba(0,150,255,0.1),
inset 0 0 15px rgba(255,255,255,0.1);

border:1px solid rgba(255,255,255,0.2);
}

/* header */

.header{
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
gap:10px;
}

.logo{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
}

.logo img{
height:50px;
border-radius:12px;
background:rgba(255,255,255,0.9);
padding:5px;
}

.title{
font-size:20px;
font-weight:600;
}

.subtitle{
font-size:13px;
opacity:0.8;
}

/* OTP */

.otpBox{
flex-grow:1;
display:flex;
flex-direction:column;
justify-content:center;
text-align:center;
}

.otp{
font-size:72px;
font-weight:700;
letter-spacing:8px;

text-shadow:
0 0 6px rgba(255,255,255,0.3),
0 0 12px rgba(0,150,255,0.3);
}

.timer{
margin-top:8px;
font-size:14px;
opacity:0.85;
}

/* progress */

.progress{
margin-top:15px;
height:8px;
background:rgba(255,255,255,0.1);
border-radius:30px;
overflow:hidden;
position:relative;
}

.bar{
height:100%;
width:100%;
background:linear-gradient(90deg,#00c6ff,#0072ff);
box-shadow:0 0 10px rgba(0,150,255,0.6);
position:relative;
}

/* running light soft */

.bar::after{
content:"";
position:absolute;
top:0;
left:-60px;
width:60px;
height:100%;
background:rgba(255,255,255,0.5);
filter:blur(8px);
animation:runlight 2s linear infinite;
}

/* grid */

.grid{
margin-top:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.info{
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
backdrop-filter:blur(10px);
}

.infoTitle{
font-size:11px;
opacity:0.7;
}

.infoValue{
font-size:14px;
font-weight:600;
margin-top:3px;
}

/* footer */

.footer{
margin-top:10px;
font-size:11px;
opacity:0.7;
text-align:center;
}

/* desktop */

@media(min-width:768px){

.container{max-width:900px;}

.card{min-height:auto;padding:40px;}

.header{
flex-direction:row;
justify-content:space-between;
text-align:left;
}

.logo{flex-direction:row;}

.title{font-size:28px;}

.otp{
font-size:110px;
letter-spacing:10px;
}

.grid{
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.info{padding:15px;}

.infoTitle{font-size:13px;}
.infoValue{font-size:18px;}

}

/* animation */

@keyframes runlight{
0%{transform:translateX(-60px)}
100%{transform:translateX(400px)}
}

</style>
</head>

<script>

const SECRET_SALT="SOOKO_HEBAT_2026";
const INTERVAL=60;

function generateOTP(){
let epoch=Math.floor(Date.now()/1000/INTERVAL);
let hash=sha1(epoch+SECRET_SALT);

return (parseInt(hash.substring(0,8),16)%1000000)
.toString()
.padStart(6,"0");
}

function update(){

let seconds=Math.floor(Date.now()/1000);
let remain=INTERVAL-(seconds%INTERVAL);

document.getElementById("timer").innerText=
"Kode berubah dalam "+remain+" detik";

document.getElementById("otp").innerText=generateOTP();

let percent=(remain/INTERVAL)*100;
document.getElementById("bar").style.width=percent+"%";

}

setInterval(update,1000);
update();

</script>

</html>
