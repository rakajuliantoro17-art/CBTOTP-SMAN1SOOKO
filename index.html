<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CBT OTP Unlock System - SMAN 1 Sooko</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha1/0.6.0/sha1.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
linear-gradient(rgba(0,0,0,0.35),rgba(0,0,0,0.4)),
url("background.jpg");

background-size:cover;
background-position:center;
color:white;
padding:10px;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(135deg,
rgba(255,0,200,0.25),
rgba(120,0,255,0.25),
rgba(0,255,170,0.25));
backdrop-filter:blur(6px);
}

/* CONTAINER */

.container{
position:relative;
z-index:2;
width:100%;
max-width:520px;
}

/* CARD */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
border-radius:24px;
padding:20px;
text-align:center;

box-shadow:
0 0 20px rgba(0,150,255,0.2),
inset 0 0 15px rgba(255,255,255,0.1);
}

/* HEADER */

.header{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
margin-bottom:15px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo img{
width:40px;
height:40px;
object-fit:contain;
}

.title{
font-size:18px;
font-weight:600;
}

.subtitle{
font-size:12px;
opacity:0.7;
}

/* OTP */

.otp{
font-size:clamp(40px, 10vw, 70px);
font-weight:700;
letter-spacing:6px;
word-break:break-all;
}

.timer{
margin-top:5px;
font-size:13px;
}

/* BAR */

.progress{
margin-top:10px;
height:6px;
background:rgba(255,255,255,0.1);
border-radius:30px;
overflow:hidden;
}

.bar{
height:100%;
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

/* PIE */

.pieWrap{
margin-top:20px;
display:flex;
justify-content:center;
}

.pie{
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
background:conic-gradient(#ff5252 0deg, rgba(255,255,255,0.1) 0deg);
}

/* BUTTON */

.btn{
margin-top:15px;
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#ff5252;
color:white;
font-size:14px;
cursor:pointer;
}

.disabled{
opacity:0.4;
pointer-events:none;
}

/* INFO */

.info{
margin-top:15px;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.box{
background:rgba(255,255,255,0.08);
padding:8px;
border-radius:10px;
}

.small{
font-size:10px;
opacity:0.7;
}

.bold{
font-size:13px;
font-weight:600;
}

/* TABLET */

@media (min-width:600px){
.card{
padding:25px;
}

.pie{
width:85px;
height:85px;
font-size:15px;
}
}

/* DESKTOP */

@media (min-width:900px){
.container{
max-width:600px;
}

.card{
padding:30px;
}

.title{
font-size:22px;
}

.otp{
font-size:80px;
letter-spacing:8px;
}

.pie{
width:100px;
height:100px;
font-size:16px;
}
}

</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="header">
<div class="logo">
<img src="https://sman1sooko.sch.id/media_library/images/397a98c4618261af0d970851901f2b5b.png">
<div>
<div class="title">CBT OTP Unlock</div>
<div class="subtitle">SMAN 1 Sooko • Tim IT</div>
</div>
</div>
<div class="subtitle">Secure Mode</div>
</div>

<div id="otp" class="otp">------</div>
<div id="timer" class="timer"></div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div class="pieWrap">
<div id="pie" class="pie">0</div>
</div>

<button id="btnPermanent" class="btn disabled" onclick="unlockPermanent()">
Unlock Permanen
</button>

<div class="info">
<div class="box">
<div class="small">Status</div>
<div class="bold">ONLINE</div>
</div>

<div class="box">
<div class="small">Mode</div>
<div class="bold">Secure</div>
</div>

<div class="box">
<div class="small">OTP</div>
<div class="bold">60 Detik</div>
</div>

<div class="box">
<div class="small">Monitoring</div>
<div class="bold">Active</div>
</div>
</div>

</div>
</div>

<script>

const SECRET="SOOKO_HEBAT_2026";
const PERMANENT_SECRET="SOOKO_PERMANENT_2026";

const INTERVAL=60;
const PERMANENT_INTERVAL=300;

function generateOTP(){
let epoch=Math.floor(Date.now()/1000/INTERVAL);
let hash=sha1(epoch+SECRET);
return (parseInt(hash.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

function generatePermanentOTP(){
let epoch=Math.floor(Date.now()/1000/PERMANENT_INTERVAL);
let hash=sha1(epoch+PERMANENT_SECRET);
return (parseInt(hash.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

function update(){

let now=Math.floor(Date.now()/1000);

/* OTP utama */
let remain=INTERVAL-(now%INTERVAL);
document.getElementById("otp").innerText=generateOTP();
document.getElementById("timer").innerText="OTP berubah dalam "+remain+" detik";
document.getElementById("bar").style.width=(remain/INTERVAL)*100+"%";

/* permanent */
let premain=PERMANENT_INTERVAL-(now%PERMANENT_INTERVAL);

/* pie */
let deg=(1-(premain/PERMANENT_INTERVAL))*360;
document.getElementById("pie").style.background=
`conic-gradient(#ff5252 ${deg}deg, rgba(255,255,255,0.1) ${deg}deg)`;

document.getElementById("pie").innerText=premain+"s";

/* tombol */
let btn=document.getElementById("btnPermanent");

if(premain<5){
btn.classList.remove("disabled");
}else{
btn.classList.add("disabled");
}

}

function unlockPermanent(){

let otp=generatePermanentOTP();

let input=prompt("OTP PERMANEN:\n"+otp+"\nMasukkan ulang:");

if(input===otp){
alert("✅ Unlock permanen berhasil");
}else{
alert("❌ OTP salah");
}

}

setInterval(update,1000);
update();

</script>

</body>
</html>
