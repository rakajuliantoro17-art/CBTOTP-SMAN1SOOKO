<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT OTP Unlock</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont;

  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.4)),
    url("background.jpg");

  background-size: cover;
  background-position: center;

  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.08);
  border-radius: 25px;
  padding: 30px;
  width: 90%;
  max-width: 420px;
  text-align: center;
  color: white;
}

.logo {
  width: 80px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 15px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  text-align: center;
  font-size: 18px;
}

button {
  margin-top: 10px;
  width: 100%;
  padding: 14px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(135deg,#00c6ff,#0072ff);
  color: white;
  font-weight: bold;
}

.status {
  margin-top: 10px;
}

.progress {
  margin-top: 15px;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
}

.bar {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  animation: countdown linear forwards;
}
</style>
</head>

<body>

<div class="container">
  <img src="https://sman1sooko.sch.id/media_library/images/397a98c4618261af0d970851901f2b5b.png" class="logo">
  <h3>CBT Unlock System</h3>

  <input id="otpInput" placeholder="Masukkan OTP (opsional)">
  <button onclick="manualCheck()">Unlock</button>

  <div class="status" id="status">Sinkronisasi OTP...</div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
</div>

<script>
let serverOTP = "";
let lastOTP = "";

// ambil OTP dari server
async function syncOTP(){
  try{
    const res = await fetch("/api/otp");
    const data = await res.json();

    serverOTP = data.otp;

    // kalau OTP berubah → auto unlock trigger
    if(serverOTP !== lastOTP){
      document.getElementById("status").innerText = "OTP baru aktif";

      // AUTO MODE (opsional)
      // langsung unlock tanpa input
      // unlock();

      lastOTP = serverOTP;
    }

  }catch{
    document.getElementById("status").innerText = "Server offline";
  }
}

// manual input
function manualCheck(){
  const input = document.getElementById("otpInput").value;

  if(input === serverOTP){
    unlock();
  }else{
    document.getElementById("status").innerText = "OTP salah";
  }
}

// aksi unlock
function unlock(){
  document.getElementById("status").innerText = "✅ AKSES DIBUKA";

  // contoh redirect ke CBT
  // location.href = "https://cbt.sch.id";

  alert("Akses CBT terbuka");
}

// sync tiap 3 detik (real-time)
setInterval(syncOTP,3000);
syncOTP();
</script>

</body>
</html>
