<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBT OTP Unlock</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", sans-serif;

  background:
    linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.4)),
    url("background.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* CONTAINER */
.container {
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  background: rgba(255, 255, 255, 0.08);
  border-radius: 25px;
  padding: 30px;
  width: 90%;
  max-width: 420px;

  text-align: center;
  color: white;

  box-shadow: 
    0 0 20px rgba(0, 150, 255, 0.25),
    0 0 40px rgba(0, 150, 255, 0.15),
    inset 0 0 15px rgba(255,255,255,0.1);
}

/* LOGO */
.logo {
  width: 80px;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 10px rgba(0,150,255,0.5));
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 15px;
  border: none;
  outline: none;

  background: rgba(255,255,255,0.15);
  color: white;
  text-align: center;
  font-size: 18px;

  box-shadow: inset 0 0 10px rgba(255,255,255,0.2);
}

/* BUTTON */
button {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  border-radius: 15px;
  border: none;

  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  font-size: 16px;
  font-weight: bold;

  cursor: pointer;

  box-shadow: 0 0 15px rgba(0,150,255,0.6);
}

/* PROGRESS */
.progress {
  margin-top: 20px;
  height: 8px;
  border-radius: 10px;
  overflow: hidden;
  background: rgba(255,255,255,0.1);
  position: relative;
}

.progress-bar {
  height: 100%;
  width: 100%;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  animation: countdown linear forwards;
}

/* running light */
.progress-bar::after {
  content: "";
  position: absolute;
  top: 0;
  width: 40px;
  height: 100%;
  background: rgba(255,255,255,0.6);
  filter: blur(10px);
  animation: lightRun 2s linear infinite;
}

@keyframes lightRun {
  from { left: -40px; }
  to { left: 100%; }
}

/* STATUS */
.status {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">
  <img src="https://sman1sooko.sch.id/media_library/images/397a98c4618261af0d970851901f2b5b.png" class="logo">

  <h2>CBT OTP Unlock</h2>

  <input type="text" id="otpInput" placeholder="Masukkan OTP">

  <button onclick="checkOTP()">Unlock</button>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="status" id="status">Mengambil OTP...</div>
</div>

<script>
let currentOTP = "";
let interval = 60;
let timer;

// ambil OTP dari API
async function fetchOTP() {
  try {
    const res = await fetch("/api/otp");
    const data = await res.json();

    currentOTP = data.otp;
    interval = data.interval;

    document.getElementById("status").innerText = "OTP aktif (" + interval + " detik)";

    startProgress(interval);

  } catch (e) {
    document.getElementById("status").innerText = "Gagal koneksi ke server";
  }
}

// progress bar countdown
function startProgress(duration) {
  const bar = document.getElementById("progressBar");

  bar.style.animation = "none";
  bar.offsetHeight; // reset
  bar.style.animation = "countdown " + duration + "s linear forwards";
}

// cek OTP
function checkOTP() {
  const input = document.getElementById("otpInput").value;

  if (input === currentOTP) {
    document.getElementById("status").innerText = "✅ OTP BENAR";
    alert("Akses diberikan");
  } else {
    document.getElementById("status").innerText = "❌ OTP SALAH";
  }
}

// refresh OTP tiap 60 detik
fetchOTP();
setInterval(fetchOTP, 60000);
</script>

</body>
</html>
