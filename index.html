<script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha1/0.6.0/sha1.min.js"></script>

<style>
#cbtLockOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:999999;
display:none;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff4ecd,#8a5bff,#00ffc8);
font-family:system-ui;
}

.cbtCard{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(18px);
border-radius:20px;
padding:30px;
width:90%;
max-width:420px;
color:white;
text-align:center;
box-shadow:0 0 40px rgba(255,255,255,0.25);
}

.cbtTitle{
font-size:22px;
font-weight:700;
}

.otp{
font-size:40px;
letter-spacing:6px;
margin-top:15px;
font-weight:bold;
}

/* BAR */
.progress{
margin-top:15px;
height:14px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
background:linear-gradient(90deg,#4facfe,#001f7a);
}

/* PIE */
.pie{
margin:20px auto;
width:90px;
height:90px;
border-radius:50%;
background:conic-gradient(red 0deg, rgba(255,255,255,0.1) 0deg);
}

/* INFO */
.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.box{
background:rgba(255,255,255,0.1);
padding:8px;
border-radius:10px;
font-size:12px;
}
</style>

<div id="cbtLockOverlay">
<div class="cbtCard">

<div class="cbtTitle">⚠ CBT LOCK</div>

<div>
OTP Biasa
<div id="otpNormal" class="otp">------</div>
</div>

<div id="permanentWrap" style="display:none;">
OTP Permanen
<div id="otpPermanent" class="otp">------</div>
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="pie" class="pie"></div>

<div class="info">
<div class="box">Status: LOCK</div>
<div class="box" id="mode">Mode: Normal</div>
<div class="box">Monitoring: Aktif</div>
<div class="box" id="viol">Pelanggaran: 0</div>
</div>

</div>
</div>

<script>
(function(){

const SECRET="SOOKO_HEBAT_2026";
const PERM="SOOKO_PERMANENT_2026";

const OTP_INTERVAL=60;
const PERM_INTERVAL=300;

let violation=parseInt(sessionStorage.getItem("cbtViolation")||0);
let locked=false;

/* OTP */
function otp(){
let e=Math.floor(Date.now()/1000/OTP_INTERVAL);
let h=sha1(e+SECRET);
return (parseInt(h.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

function otp2(){
let e=Math.floor(Date.now()/1000/PERM_INTERVAL);
let h=sha1(e+PERM);
return (parseInt(h.substring(0,8),16)%1000000).toString().padStart(6,"0");
}

/* UPDATE */
function update(){

let now=Math.floor(Date.now()/1000);

/* OTP */
document.getElementById("otpNormal").innerText=otp();

/* BAR */
let remain=OTP_INTERVAL-(now%OTP_INTERVAL);
document.getElementById("bar").style.width=(remain/OTP_INTERVAL)*100+"%";

/* PIE */
let premain=PERM_INTERVAL-(now%PERM_INTERVAL);
let percent=1-(premain/PERM_INTERVAL);
let deg=percent*360;

/* warna */
let r = percent < 0.5 ? 255 : Math.floor(255 - (percent-0.5)*2*255);
let g = percent > 0.5 ? 255 : Math.floor(percent*2*255);

let color = `rgb(${r},${g},0)`;

document.getElementById("pie").style.background=
`conic-gradient(${color} ${deg}deg, rgba(255,255,255,0.1) ${deg}deg)`;

/* OTP permanen muncul */
if(premain<5){
document.getElementById("permanentWrap").style.display="block";
document.getElementById("otpPermanent").innerText=otp2();
document.getElementById("mode").innerText="Mode: Permanent";
}

}

/* VIOLATION */
function trigger(){

if(locked) return;

violation++;
sessionStorage.setItem("cbtViolation",violation);

document.getElementById("viol").innerText="Pelanggaran: "+violation;

locked=true;
document.getElementById("cbtLockOverlay").style.display="flex";

}

/* DETEKSI */
document.addEventListener("visibilitychange",()=>{
if(document.hidden) trigger();
});

window.addEventListener("blur",()=>trigger());

/* START */
setInterval(update,1000);
update();

})();
</script>
